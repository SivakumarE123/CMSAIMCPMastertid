services:
  mcp-server:
    build: .
    container_name: mcp-multitool
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
